name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  build:
    name: Build
    runs-on: macos-15
    needs: lint
    strategy:
      matrix:
        scheme: [Ikeru, IkeruWatch, IkeruWidget]
        include:
          - scheme: Ikeru
            destination: "platform=iOS Simulator,name=iPhone 16,OS=latest"
          - scheme: IkeruWatch
            destination: "platform=watchOS Simulator,name=Apple Watch Series 10 (46mm),OS=latest"
          - scheme: IkeruWidget
            destination: "platform=iOS Simulator,name=iPhone 16,OS=latest"

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Ikeru.xcodeproj \
            -scheme ${{ matrix.scheme }}

      - name: Build ${{ matrix.scheme }}
        run: |
          xcodebuild build \
            -project Ikeru.xcodeproj \
            -scheme ${{ matrix.scheme }} \
            -destination "${{ matrix.destination }}" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO

  test:
    name: Test
    runs-on: macos-15
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)/Contents/Developer"

      - name: Run IkeruCore Tests
        run: |
          cd IkeruCore
          swift test

      - name: Run App Tests
        run: |
          xcodebuild test \
            -project Ikeru.xcodeproj \
            -scheme Ikeru \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO
