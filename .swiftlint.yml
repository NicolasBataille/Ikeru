# SwiftLint Configuration for Ikeru
#
# Pragmatic config: catches real issues (force-unwrap, force-cast, fatal
# errors) without burying the codebase in style nits. The existing code
# uses trailing commas, multi-line dictionary keys, and "mastery"
# terminology that SwiftLint's stricter rules don't like — those are
# disabled so the gate stays useful for new code.

included:
  - Ikeru
  - IkeruCore/Sources
  - IkeruCore/Tests
  - IkeruTests
  - IkeruWatch
  - IkeruWidget

excluded:
  - IkeruCore/.build
  - DerivedData
  - .build
  - .swiftpm
  - Pods
  - wiki-vault

# Rules

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - fatal_error_message
  - first_where
  - last_where
  - implicitly_unwrapped_optional
  - modifier_order
  - overridden_super_call
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - sorted_first_last
  - unowned_variable_capture
  - explicit_init
  - prefer_self_type_over_type_of_self

disabled_rules:
  # Style preferences the project disagrees with
  - trailing_whitespace
  - opening_brace
  - vertical_whitespace_closing_braces
  - colon
  - trailing_comma
  - shorthand_operator
  - implicit_optional_initialization
  - redundant_optional_initialization
  # Domain-correct words the inclusive_language rule mis-flags
  # ("master"/"mastery" are core to the FSRS / language-learning domain)
  - inclusive_language
  # SwiftUI naturally produces complex bodies and deep nesting
  - cyclomatic_complexity
  - nesting
  - multiple_closures_with_trailing_closure
  - large_tuple
  # Pre-existing in many test fixtures (`x.count == 0` vs `.isEmpty`).
  # Not safety-critical; can re-enable + clean up later.
  - empty_count
  # Some service builders intentionally take >5 params for clarity.
  - function_parameter_count
  # TODOs are useful while features are in flight.
  - todo

# Rule configurations — bumped to match the existing codebase reality.

line_length:
  warning: 200
  error: 400
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true
  ignores_interpolated_strings: true

file_length:
  warning: 1200
  error: 1800

type_body_length:
  warning: 600
  error: 900

function_body_length:
  warning: 80
  error: 160

force_unwrapping:
  severity: warning

force_cast:
  severity: warning

force_try:
  severity: warning

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - x
    - y
    - r
    - g
    - b
    - to
    - of
    - i
    - h
    - w
    - SQLITE_TRANSIENT

reporter: xcode
