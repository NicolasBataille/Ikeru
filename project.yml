name: Ikeru
options:
  bundleIdPrefix: com.ikeru
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: N84YXYF2NZ

packages:
  IkeruCore:
    path: IkeruCore
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.16.0"

targets:
  Ikeru:
    type: application
    platform: iOS
    sources:
      - path: Ikeru
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: IkeruCore
      - package: PostHog
        product: PostHog
      - target: IkeruWidget
        embed: true
    settings:
      base:
        INFOPLIST_FILE: Ikeru/Info.plist
        CODE_SIGN_ENTITLEMENTS: Ikeru/Ikeru.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.ikeru.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        # PostHog product analytics. The API key is empty by default so debug
        # builds and contributors without a key produce no traffic — the app
        # gracefully falls back to the noop AnalyticsService. To wire it up:
        #   * Local dev: set a Xcode user-defined build setting POSTHOG_API_KEY,
        #     or invoke xcodebuild with POSTHOG_API_KEY=phc_xxxxx.
        #   * CI: pass POSTHOG_API_KEY=$POSTHOG_API_KEY on the xcodebuild line,
        #     reading from a repo secret.
        # The host defaults to the EU cloud — keeps data inside the EU and
        # avoids adding a non-EU sub-processor to the privacy policy.
        POSTHOG_API_KEY: ""
        POSTHOG_HOST: "https://eu.i.posthog.com"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
    resources:
      - path: Ikeru/Resources
        buildPhase: resources

  IkeruTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: IkeruTests
    dependencies:
      - target: Ikeru
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ikeru.app.tests
        GENERATE_INFOPLIST_FILE: true
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Ikeru.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Ikeru"

  IkeruWatch:
    type: application
    platform: watchOS
    sources:
      - path: IkeruWatch
    dependencies:
      - package: IkeruCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ikeru.app.watch
        GENERATE_INFOPLIST_FILE: true
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        SDKROOT: watchos
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.ikeru.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"

  IkeruWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: IkeruWidget
    dependencies:
      - package: IkeruCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ikeru.app.widget
        CODE_SIGN_ENTITLEMENTS: IkeruWidget/IkeruWidget.entitlements
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: IkeruWidget/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: IkeruWidget/IkeruWidget.entitlements

schemes:
  Ikeru:
    build:
      targets:
        Ikeru: all
        IkeruTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - IkeruTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  IkeruWatch:
    build:
      targets:
        IkeruWatch: all
    run:
      config: Debug

  IkeruWidget:
    build:
      targets:
        IkeruWidget: all
    run:
      config: Debug
